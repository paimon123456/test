<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>销售开单</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>
        .container { padding: 20px; }
        .header { margin-bottom: 20px; }
        .member-info { background: #f5f7fa; padding: 15px; border-radius: 4px; margin-bottom: 20px; }
        .drug-search { margin-bottom: 20px; }
        .cart-table { margin-bottom: 20px; }
        .summary { background: #fff; padding: 20px; border: 1px solid #dcdfe6; border-radius: 4px; }
        .total-row { font-size: 18px; font-weight: bold; margin-top: 10px; }
        .pay-type-section { margin-bottom: 20px; padding: 16px; background: #f5f7fa; border-radius: 8px; }
        .pay-type-section .section-title { font-size: 16px; font-weight: 600; color: #303133; margin-bottom: 12px; }
        .pay-type-options { display: flex; gap: 12px; flex-wrap: wrap; }
        .pay-type-card { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100px; height: 80px; border: 2px solid #dcdfe6; border-radius: 8px; cursor: pointer; transition: all 0.3s; background: #fff; padding: 8px; }
        .pay-type-card:hover { border-color: #409eff; background: #ecf5ff; }
        .pay-type-card.active { border-color: #409eff; background: #ecf5ff; box-shadow: 0 0 8px rgba(64,158,255,0.3); }
        .pay-type-card .pay-icon { font-size: 28px; margin-bottom: 6px; }
        .pay-type-card .pay-label { font-size: 13px; color: #606266; }
        .pay-type-card.active .pay-label { color: #409eff; font-weight: 600; }
        .pay-icon-cash { color: #67c23a; }
        .pay-icon-wechat { color: #07c160; }
        .pay-icon-alipay { color: #1677ff; }
        .pay-icon-insurance { color: #e6a23c; }
        .pay-icon-bank { color: #909399; }
    </style>
</head>
<body>
<div id="app" class="container">
    <div class="header">
        <h2>销售开单</h2>
    </div>

    <!-- 会员信息 -->
    <div class="member-info">
        <el-row :gutter="20">
            <el-col :span="8">
                <el-input v-model="memberCardNo" placeholder="输入会员卡号" @blur="loadMemberInfo">
                    <el-button slot="append" icon="el-icon-search" @click="loadMemberInfo"></el-button>
                </el-input>
            </el-col>
            <el-col :span="16" v-if="currentMember">
                <span>会员：{{ currentMember.name }}</span>
                <span style="margin-left: 20px;">积分：{{ currentMember.points }}</span>
                <span style="margin-left: 20px;">手机：{{ currentMember.phone }}</span>
            </el-col>
        </el-row>
    </div>

    <!-- 药品搜索 -->
    <div class="drug-search">
        <el-input v-model="drugSearchKeyword" placeholder="扫描或输入药品名称/编码" @keyup.enter.native="searchDrug" style="width: 400px; margin-right: 10px;">
            <el-button slot="append" icon="el-icon-search" @click="searchDrug"></el-button>
        </el-input>
    </div>

    <!-- 药品选择对话框 -->
    <el-dialog title="选择药品" :visible.sync="drugDialogVisible" width="60%">
        <el-table :data="drugList" @row-click="addDrugToCart" highlight-current-row>
            <el-table-column prop="drugName" label="药品名称"></el-table-column>
            <el-table-column prop="specification" label="规格" width="120"></el-table-column>
            <el-table-column prop="manufacturer" label="生产厂家" width="150"></el-table-column>
            <el-table-column prop="retailPrice" label="零售价" width="100"></el-table-column>
            <el-table-column label="库存" width="100">
                <template slot-scope="scope">{{ getDrugStock(scope.row.drugId) }}</template>
            </el-table-column>
        </el-table>
    </el-dialog>

    <!-- 购物车表格 -->
    <el-table :data="cartItems" border class="cart-table">
        <el-table-column prop="drugName" label="药品名称"></el-table-column>
        <el-table-column prop="specification" label="规格" width="120"></el-table-column>
        <el-table-column prop="batchNo" label="批号" width="120"></el-table-column>
        <el-table-column label="数量" width="150">
            <template slot-scope="scope">
                <el-input-number v-model="scope.row.saleNum" :min="1" :max="scope.row.maxStock" size="small" @change="calculateTotal"></el-input-number>
            </template>
        </el-table-column>
        <el-table-column label="单价" width="120">
            <template slot-scope="scope">
                <el-input-number v-model="scope.row.salePrice" :precision="2" :step="0.1" size="small" @change="calculateTotal"></el-input-number>
            </template>
        </el-table-column>
        <el-table-column label="小计" width="120">
            <template slot-scope="scope">¥{{ (scope.row.saleNum * scope.row.salePrice).toFixed(2) }}</template>
        </el-table-column>
        <el-table-column label="操作" width="80">
            <template slot-scope="scope">
                <el-button type="danger" size="mini" @click="removeFromCart(scope.$index)">删除</el-button>
            </template>
        </el-table-column>
    </el-table>

    <!-- 支付方式选择 -->
    <div class="pay-type-section">
        <div class="section-title">选择支付方式</div>
        <div class="pay-type-options">
            <div class="pay-type-card" :class="{ active: payType === '现金' }" @click="payType = '现金'">
                <span class="pay-icon pay-icon-cash">💰</span>
                <span class="pay-label">现金</span>
            </div>
            <div class="pay-type-card" :class="{ active: payType === '微信' }" @click="payType = '微信'">
                <span class="pay-icon pay-icon-wechat">💚</span>
                <span class="pay-label">微信</span>
            </div>
            <div class="pay-type-card" :class="{ active: payType === '支付宝' }" @click="payType = '支付宝'">
                <span class="pay-icon pay-icon-alipay">💙</span>
                <span class="pay-label">支付宝</span>
            </div>
            <div class="pay-type-card" :class="{ active: payType === '医保' }" @click="payType = '医保'">
                <span class="pay-icon pay-icon-insurance">🏥</span>
                <span class="pay-label">医保</span>
            </div>
            <div class="pay-type-card" :class="{ active: payType === '银行卡' }" @click="payType = '银行卡'">
                <span class="pay-icon pay-icon-bank">💳</span>
                <span class="pay-label">银行卡</span>
            </div>
        </div>
    </div>

    <!-- 结算信息 -->
    <div class="summary">
        <el-row :gutter="20">
            <el-col :span="8">
                <div style="display:flex;align-items:center;height:40px;font-size:16px;font-weight:600;">
                    支付方式：<span style="color:#409eff;">{{ payType }}</span>
                </div>
            </el-col>
            <el-col :span="8">
                <el-input v-model="discount" placeholder="优惠金额" type="number" @input="handleDiscountChange">
                    <template slot="prepend">优惠</template>
                </el-input>
            </el-col>
            <el-col :span="8">
                <el-input v-model="pointsUsed" placeholder="使用积分" type="number" @input="handlePointsChange">
                    <template slot="prepend">积分抵扣</template>
                </el-input>
            </el-col>
        </el-row>
        <div class="total-row">
            <el-row :gutter="20">
                <el-col :span="8">应收金额：¥{{ totalAmount.toFixed(2) }}</el-col>
                <el-col :span="8">实收金额：¥{{ payAmount.toFixed(2) }}</el-col>
                <el-col :span="8">
                    <el-button type="primary" size="large" @click="submitOrder" :disabled="cartItems.length === 0">提交订单</el-button>
                    <el-button size="large" @click="clearCart">清空</el-button>
                </el-col>
            </el-row>
        </div>
    </div>
</div>

<script src="https://unpkg.com/vue@2/dist/vue.js"></script>
<script src="https://unpkg.com/element-ui/lib/index.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script>
axios.defaults.baseURL = 'http://localhost:8080';
</script>
<script>
new Vue({
    el: '#app',
    data: {
        memberCardNo: '',
        currentMember: null,
        drugSearchKeyword: '',
        drugDialogVisible: false,
        drugList: [],
        cartItems: [],
        payType: '微信',
        discount: 0,
        pointsUsed: 0,
        totalAmount: 0,
        payAmount: 0,
        cashierId: '', // 从登录用户获取
        cashierName: ''
    },
    mounted() {
        // 从 localStorage 获取登录用户信息
        const userInfo = localStorage.getItem('userInfo');
        if (userInfo) {
            const user = JSON.parse(userInfo);
            this.cashierId = user.userId;
            this.cashierName = user.realName || user.username;
        } else {
            // 如果没有登录，跳转到登录页
            this.$message.warning('请先登录');
            setTimeout(() => location.href = 'login.html', 1000);
        }
    },
    methods: {
        loadMemberInfo() {
            if (!this.memberCardNo) return;
            axios.get(`/sales/member/card/${this.memberCardNo}`)
                .then(res => {
                    if (res.data.code === 200) {
                        this.currentMember = res.data.data;
                        this.$message.success('会员加载成功');
                    } else {
                        this.$message.warning('会员不存在');
                        this.currentMember = null;
                    }
                });
        },
        searchDrug() {
            if (!this.drugSearchKeyword) {
                this.$message.warning('请输入药品名称或编码');
                return;
            }
            
            const loading = this.$loading({
                lock: true,
                text: '搜索中...',
                spinner: 'el-icon-loading',
                background: 'rgba(0, 0, 0, 0.7)'
            });
            
            axios.get('/drug/list', {
                params: {
                    drugName: this.drugSearchKeyword,
                    pageNum: 1,
                    pageSize: 100
                }
            })
            .then(res => {
                loading.close();
                if (res.data.code === 200) {
                    // 从分页数据中获取记录
                    const records = res.data.data.records || res.data.data.list || [];
                    // 前端过滤
                    this.drugList = records.filter(drug => 
                        drug.drugName && drug.drugName.includes(this.drugSearchKeyword)
                    );
                    
                    if (this.drugList.length === 0) {
                        this.$message.warning('未找到匹配的药品');
                    } else {
                        this.drugDialogVisible = true;
                    }
                } else {
                    this.$message.error('搜索失败：' + res.data.msg);
                }
            })
            .catch(err => {
                loading.close();
                console.error('搜索药品失败：', err);
                this.$message.error('搜索失败，请检查网络连接');
            });
        },
        getDrugStock(drugId) {
            // 简化：实际应该查询库存表
            return '充足';
        },
        addDrugToCart(drug) {
            // 检查是否已在购物车
            const existing = this.cartItems.find(item => item.drugId === drug.drugId);
            if (existing) {
                existing.saleNum++;
            } else {
                this.cartItems.push({
                    drugId: drug.drugId,
                    drugName: drug.drugName,
                    specification: drug.specification,
                    batchNo: '', // 需要从库存获取
                    saleNum: 1,
                    salePrice: drug.retailPrice,
                    maxStock: 999
                });
            }
            this.calculateTotal();
            this.drugDialogVisible = false;
            this.drugSearchKeyword = '';
        },
        removeFromCart(index) {
            this.cartItems.splice(index, 1);
            this.calculateTotal();
        },
        calculateTotal() {
            this.totalAmount = this.cartItems.reduce((sum, item) => sum + item.saleNum * item.salePrice, 0);
            // 实收金额 = 应收金额 - 优惠金额（100积分=1元，优惠金额已与积分同步）
            this.payAmount = this.totalAmount - (this.discount || 0);
        },
        handleDiscountChange(val) {
            // 优惠金额变化时，按100积分=1元同步积分抵扣
            if (val && !isNaN(val) && parseFloat(val) > 0) {
                this.discount = parseFloat(val);
                this.pointsUsed = Math.round(this.discount * 100);
            } else {
                this.discount = 0;
                this.pointsUsed = 0;
            }
            this.calculateTotal();
        },
        handlePointsChange(val) {
            // 积分抵扣变化时，按100积分=1元同步优惠金额
            if (val && !isNaN(val) && parseInt(val) > 0) {
                this.pointsUsed = parseInt(val);
                this.discount = Math.round(this.pointsUsed / 100 * 100) / 100;
            } else {
                this.pointsUsed = 0;
                this.discount = 0;
            }
            this.calculateTotal();
        },
        submitOrder() {
            if (this.cartItems.length === 0) {
                this.$message.warning('购物车为空');
                return;
            }

            const orderData = {
                memberId: this.currentMember ? this.currentMember.memberId : null,
                cashierId: this.cashierId,
                payType: this.payType,
                discount: this.discount || 0,
                pointsUsed: this.pointsUsed || 0,
                items: this.cartItems.map(item => ({
                    drugId: item.drugId,
                    saleNum: item.saleNum,
                    salePrice: item.salePrice
                }))
            };

            axios.post('/sales/order/create', orderData)
                .then(res => {
                    if (res.data.code === 200) {
                        this.$message.success('订单提交成功！订单号：' + res.data.data.orderId);
                        this.clearCart();
                    } else {
                        this.$message.error(res.data.msg);
                    }
                })
                .catch(err => {
                    this.$message.error('提交失败：' + err.message);
                });
        },
        clearCart() {
            this.cartItems = [];
            this.totalAmount = 0;
            this.payAmount = 0;
            this.discount = 0;
            this.pointsUsed = 0;
        }
    }
});
</script>
</body>
</html>
