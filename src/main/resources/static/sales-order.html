<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>销售订单查询</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>.container { padding: 20px; } .search-bar { margin-bottom: 20px; } .pagination { margin-top: 20px; text-align: right; }</style>
</head>
<body>
<div id="app" class="container">
    <h2>销售订单查询</h2>
    
    <!-- 搜索栏 -->
    <div class="search-bar">
        <el-input v-model="searchForm.orderId" placeholder="订单号" style="width: 150px; margin-right: 10px;"></el-input>
        <el-input v-model="searchForm.memberName" placeholder="会员姓名" style="width: 120px; margin-right: 10px;"></el-input>
        <el-select v-model="searchForm.status" placeholder="状态" clearable style="width: 120px; margin-right: 10px;">
            <el-option label="已完成" value="已完成"></el-option>
            <el-option label="已退货" value="已退货"></el-option>
            <el-option label="已取消" value="已取消"></el-option>
        </el-select>
        <el-date-picker v-model="dateRange" type="daterange" range-separator="至" start-placeholder="开始日期" end-placeholder="结束日期" style="margin-right: 10px;"></el-date-picker>
        <el-button type="primary" @click="search">查询</el-button>
        <el-button @click="reset">重置</el-button>
    </div>

    <!-- 订单列表 -->
    <el-table :data="tableData" border v-loading="loading" @row-click="viewDetail">
        <el-table-column prop="orderId" label="订单号" width="180"></el-table-column>
        <el-table-column prop="memberName" label="会员" width="100">
            <template slot-scope="scope">{{ scope.row.memberName || '散客' }}</template>
        </el-table-column>
        <el-table-column prop="cashierName" label="收银员" width="100"></el-table-column>
        <el-table-column prop="totalNum" label="数量" width="80"></el-table-column>
        <el-table-column prop="totalAmount" label="应收" width="100">
            <template slot-scope="scope">¥{{ scope.row.totalAmount }}</template>
        </el-table-column>
        <el-table-column prop="discount" label="优惠" width="100">
            <template slot-scope="scope">¥{{ scope.row.discount }}</template>
        </el-table-column>
        <el-table-column prop="payAmount" label="实收" width="100">
            <template slot-scope="scope">¥{{ scope.row.payAmount }}</template>
        </el-table-column>
        <el-table-column prop="payType" label="支付方式" width="100"></el-table-column>
        <el-table-column prop="orderTime" label="下单时间" width="160"></el-table-column>
        <el-table-column prop="status" label="状态" width="100">
            <template slot-scope="scope">
                <el-tag :type="getStatusType(scope.row.status)">{{ scope.row.status }}</el-tag>
            </template>
        </el-table-column>
    </el-table>

    <!-- 分页 -->
    <div class="pagination">
        <el-pagination @current-change="handleCurrentChange" :current-page="pageNum" :page-size="pageSize" :total="total" layout="total, prev, pager, next"></el-pagination>
    </div>

    <!-- 订单详情对话框 -->
    <el-dialog title="订单详情" :visible.sync="detailDialogVisible" width="60%">
        <div v-if="currentOrder">
            <el-descriptions :column="2" border>
                <el-descriptions-item label="订单号">{{ currentOrder.orderId }}</el-descriptions-item>
                <el-descriptions-item label="会员">{{ currentOrder.memberName || '散客' }}</el-descriptions-item>
                <el-descriptions-item label="收银员">{{ currentOrder.cashierName }}</el-descriptions-item>
                <el-descriptions-item label="支付方式">{{ currentOrder.payType }}</el-descriptions-item>
                <el-descriptions-item label="下单时间">{{ currentOrder.orderTime }}</el-descriptions-item>
                <el-descriptions-item label="状态">
                    <el-tag :type="getStatusType(currentOrder.status)">{{ currentOrder.status }}</el-tag>
                </el-descriptions-item>
            </el-descriptions>
            
            <h4 style="margin-top: 20px;">订单明细</h4>
            <el-table :data="orderItems" border>
                <el-table-column prop="drugName" label="药品名称"></el-table-column>
                <el-table-column prop="specification" label="规格" width="120"></el-table-column>
                <el-table-column prop="batchNo" label="批号" width="120"></el-table-column>
                <el-table-column prop="saleNum" label="数量" width="80"></el-table-column>
                <el-table-column prop="salePrice" label="单价" width="100">
                    <template slot-scope="scope">¥{{ scope.row.salePrice }}</template>
                </el-table-column>
                <el-table-column label="小计" width="100">
                    <template slot-scope="scope">¥{{ (scope.row.saleNum * scope.row.salePrice).toFixed(2) }}</template>
                </el-table-column>
            </el-table>
        </div>
    </el-dialog>
</div>

<script src="https://unpkg.com/vue@2/dist/vue.js"></script>
<script src="https://unpkg.com/element-ui/lib/index.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script>
axios.defaults.baseURL = 'http://localhost:8080';
</script>
<script>
new Vue({
    el: '#app',
    data: {
        loading: false,
        tableData: [],
        pageNum: 1,
        pageSize: 10,
        total: 0,
        searchForm: { orderId: '', memberName: '', status: '' },
        dateRange: [],
        detailDialogVisible: false,
        currentOrder: null,
        orderItems: []
    },
    mounted() {
        this.loadData();
    },
    methods: {
        loadData() {
            this.loading = true;
            const params = {
                orderId: this.searchForm.orderId,
                status: this.searchForm.status,
                pageNum: this.pageNum,
                pageSize: this.pageSize
            };
            
            if (this.dateRange && this.dateRange.length === 2) {
                params.startDate = this.formatDate(this.dateRange[0]);
                params.endDate = this.formatDate(this.dateRange[1]);
            }

            axios.get('/sales/order/list', { params })
                .then(res => {
                    if (res.data.code === 200) {
                        this.tableData = res.data.data.records;
                        this.total = res.data.data.total;
                    }
                    this.loading = false;
                })
                .catch(() => {
                    this.loading = false;
                    this.$message.error('加载失败');
                });
        },
        viewDetail(row) {
            this.currentOrder = row;
            axios.get(`/sales/order/${row.orderId}`)
                .then(res => {
                    if (res.data.code === 200) {
                        this.orderItems = res.data.data.items;
                        this.detailDialogVisible = true;
                    }
                });
        },
        search() {
            this.pageNum = 1;
            this.loadData();
        },
        reset() {
            this.searchForm = { orderId: '', memberName: '', status: '' };
            this.dateRange = [];
            this.pageNum = 1;
            this.loadData();
        },
        handleCurrentChange(val) {
            this.pageNum = val;
            this.loadData();
        },
        formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        },
        getStatusType(status) {
            const map = { '已完成': 'success', '已退货': 'warning', '已取消': 'info' };
            return map[status] || '';
        }
    }
});
</script>
</body>
</html>
