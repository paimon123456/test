<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>库位管理</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>.container { padding: 20px; } .search-bar { margin-bottom: 20px; } .pagination { margin-top: 20px; text-align: right; }</style>
</head>
<body>
<div id="app" class="container">
    <h2>库位管理</h2>
    <div class="search-bar">
        <el-select v-model="searchForm.warehouseId" placeholder="选择仓库" clearable style="width: 180px; margin-right: 10px;">
            <el-option v-for="item in warehouseList" :key="item.warehouseId" :label="item.warehouseName" :value="item.warehouseId"></el-option>
        </el-select>
        <el-select v-model="searchForm.status" placeholder="状态" clearable style="width: 120px; margin-right: 10px;">
            <el-option label="空闲" value="空闲"></el-option>
            <el-option label="占用" value="占用"></el-option>
            <el-option label="锁定" value="锁定"></el-option>
        </el-select>
        <el-button type="primary" @click="search">查询</el-button>
        <el-button @click="reset">重置</el-button>
        <el-button type="success" @click="showAddDialog">新增库位</el-button>
    </div>
    <el-table :data="tableData" border v-loading="loading">
        <el-table-column prop="locCode" label="库位编码" width="100"></el-table-column>
        <el-table-column prop="warehouseName" label="所属仓库"></el-table-column>
        <el-table-column prop="zone" label="库区" width="80"></el-table-column>
        <el-table-column prop="shelf" label="货架号" width="80"></el-table-column>
        <el-table-column prop="level" label="层号" width="80"></el-table-column>
        <el-table-column prop="status" label="状态" width="100">
            <template slot-scope="scope">
                <el-tag :type="scope.row.status === '空闲' ? 'success' : (scope.row.status === '占用' ? 'warning' : 'danger')">{{ scope.row.status }}</el-tag>
            </template>
        </el-table-column>
        <el-table-column label="操作" width="150">
            <template slot-scope="scope">
                <el-button size="mini" @click="showEditDialog(scope.row)">编辑</el-button>
            </template>
        </el-table-column>
    </el-table>
    <div class="pagination">
        <el-pagination @current-change="handleCurrentChange" :current-page="pageNum" :page-size="pageSize" :total="total" layout="total, prev, pager, next"></el-pagination>
    </div>
    <el-dialog :title="dialogTitle" :visible.sync="dialogVisible" width="500px">
        <el-form :model="form" label-width="100px">
            <el-form-item label="所属仓库">
                <el-select v-model="form.warehouseId" placeholder="选择仓库" style="width: 100%;">
                    <el-option v-for="item in warehouseList" :key="item.warehouseId" :label="item.warehouseName" :value="item.warehouseId"></el-option>
                </el-select>
            </el-form-item>
            <el-form-item label="库区"><el-input v-model="form.zone" placeholder="如：A区"></el-input></el-form-item>
            <el-form-item label="货架号"><el-input v-model="form.shelf" placeholder="如：A01"></el-input></el-form-item>
            <el-form-item label="层号"><el-input v-model="form.level" placeholder="如：01"></el-input></el-form-item>
            <el-form-item label="库位编码"><el-input v-model="form.locCode" disabled placeholder="自动生成(货架号-层号)"></el-input></el-form-item>
            <el-form-item label="状态">
                <el-select v-model="form.status" style="width: 100%;">
                    <el-option label="空闲" value="空闲"></el-option>
                    <el-option label="占用" value="占用"></el-option>
                    <el-option label="锁定" value="锁定"></el-option>
                </el-select>
            </el-form-item>
        </el-form>
        <div slot="footer">
            <el-button @click="dialogVisible = false">取消</el-button>
            <el-button type="primary" @click="submitForm">确定</el-button>
        </div>
    </el-dialog>
</div>
<script src="https://unpkg.com/vue@2/dist/vue.js"></script>
<script src="https://unpkg.com/element-ui/lib/index.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script>
axios.defaults.baseURL = 'http://localhost:8080';
</script>
<script>
new Vue({
    el: '#app',
    data: {
        loading: false, tableData: [], warehouseList: [], pageNum: 1, pageSize: 10, total: 0,
        searchForm: { warehouseId: '', status: '' },
        dialogVisible: false, dialogTitle: '', isEdit: false,
        form: { locId: '', warehouseId: '', zone: '', shelf: '', level: '', status: '空闲' }
    },
    mounted() { this.loadWarehouseList(); this.loadData(); },
    methods: {
        loadWarehouseList() {
            axios.get('/warehouse/list', { params: { pageSize: 100 } }).then(res => { if (res.data.code === 200) this.warehouseList = res.data.data.list; });
        },
        loadData() {
            this.loading = true;
            axios.get('/location/list', { params: { warehouseId: this.searchForm.warehouseId, status: this.searchForm.status, pageNum: this.pageNum, pageSize: this.pageSize }})
                .then(res => { if (res.data.code === 200) { this.tableData = res.data.data.list; this.total = res.data.data.total; } this.loading = false; })
                .catch(() => { this.loading = false; this.$message.error('加载失败'); });
        },
        search() { this.pageNum = 1; this.loadData(); },
        reset() { this.searchForm = { warehouseId: '', status: '' }; this.pageNum = 1; this.loadData(); },
        handleCurrentChange(val) { this.pageNum = val; this.loadData(); },
        showAddDialog() { this.isEdit = false; this.dialogTitle = '新增库位'; this.form = { locId: '', warehouseId: '', zone: '', shelf: '', level: '', status: '空闲' }; this.dialogVisible = true; },
        showEditDialog(row) { this.isEdit = true; this.dialogTitle = '编辑库位'; this.form = { ...row }; this.dialogVisible = true; },
        submitForm() {
            if (!this.form.warehouseId || !this.form.zone || !this.form.shelf || !this.form.level) {
                this.$message.warning('请填写完整的库位信息');
                return;
            }
            const url = this.isEdit ? '/location/update' : '/location/add';
            axios.post(url, this.form)
                .then(res => {
                    if (res.data.code === 200) {
                        this.$message.success(this.isEdit ? '修改成功' : '新增成功');
                        this.dialogVisible = false;
                        this.loadData();
                    } else {
                        this.$message.error(res.data.msg || '操作失败');
                    }
                });
        }
    }
});
</script>
</body>
</html>
