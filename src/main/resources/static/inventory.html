<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>库存查询</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <style>.container { padding: 20px; } .search-bar { margin-bottom: 20px; } .pagination { margin-top: 20px; text-align: right; }</style>
</head>
<body>
<div id="app" class="container">
    <h2>库存查询</h2>
    <div class="search-bar">
        <el-select v-model="searchForm.warehouseId" placeholder="选择仓库" clearable style="width: 150px; margin-right: 10px;">
            <el-option v-for="item in warehouseList" :key="item.warehouseId" :label="item.warehouseName" :value="item.warehouseId"></el-option>
        </el-select>
        <el-input v-model="searchForm.drugName" placeholder="药品名称" style="width: 150px; margin-right: 10px;"></el-input>
        <el-select v-model="searchForm.status" placeholder="状态" clearable style="width: 120px; margin-right: 10px;">
            <el-option label="正常" value="正常"></el-option>
            <el-option label="临期(90天)" value="临期"></el-option>
            <el-option label="近效期(30天)" value="近效期"></el-option>
            <el-option label="过期" value="过期"></el-option>
            <el-option label="锁定" value="锁定"></el-option>
        </el-select>
        <el-button type="primary" @click="search">查询</el-button>
        <el-button @click="reset">重置</el-button>
    </div>
    <el-table :data="tableData" border v-loading="loading">
        <el-table-column prop="inventoryId" label="库存ID" width="160"></el-table-column>
        <el-table-column prop="drugName" label="药品名称"></el-table-column>
        <el-table-column prop="specification" label="规格" width="120"></el-table-column>
        <el-table-column prop="batchNo" label="批号" width="120"></el-table-column>
        <el-table-column prop="warehouseName" label="所在仓库" width="120"></el-table-column>
        <el-table-column label="货架位置" width="150">
            <template slot-scope="scope">{{ scope.row.zone ? scope.row.zone + '-' + scope.row.shelf + '-' + scope.row.level : scope.row.location }}</template>
        </el-table-column>
        <el-table-column prop="stockNum" label="库存数量" width="90"></el-table-column>
        <el-table-column prop="minStock" label="最低库存预警" width="110"></el-table-column>
        <el-table-column prop="expiryDate" label="有效期至" width="120"></el-table-column>
        <el-table-column prop="status" label="状态" width="90">
            <template slot-scope="scope">
                <el-tag :type="getStatusType(scope.row)">{{ scope.row.dynamicStatus || scope.row.status }}</el-tag>
            </template>
        </el-table-column>
    </el-table>
    <div class="pagination">
        <el-pagination @current-change="handleCurrentChange" :current-page="pageNum" :page-size="pageSize" :total="total" layout="total, prev, pager, next"></el-pagination>
    </div>
</div>
<script src="https://unpkg.com/vue@2/dist/vue.js"></script>
<script src="https://unpkg.com/element-ui/lib/index.js"></script>
<script src="https://unpkg.com/axios/dist/axios.min.js"></script>
<script>
axios.defaults.baseURL = 'http://localhost:8080';
</script>
<script>
new Vue({
    el: '#app',
    data: {
        loading: false, tableData: [], warehouseList: [], pageNum: 1, pageSize: 10, total: 0,
        searchForm: { warehouseId: '', drugName: '', status: '' }
    },
    mounted() { this.loadWarehouseList(); this.loadData(); },
    methods: {
        loadWarehouseList() {
            axios.get('/warehouse/list', { params: { pageSize: 100 } }).then(res => { if (res.data.code === 200) this.warehouseList = res.data.data.list; });
        },
        loadData() {
            this.loading = true;
            axios.get('/inventory/list', { params: { warehouseId: this.searchForm.warehouseId, drugName: this.searchForm.drugName, status: this.searchForm.status, pageNum: this.pageNum, pageSize: this.pageSize }})
                .then(res => { if (res.data.code === 200) { this.tableData = res.data.data.list; this.total = res.data.data.total; } this.loading = false; })
                .catch(() => { this.loading = false; this.$message.error('加载失败'); });
        },
        search() { this.pageNum = 1; this.loadData(); },
        reset() { this.searchForm = { warehouseId: '', drugName: '', status: '' }; this.pageNum = 1; this.loadData(); },
        handleCurrentChange(val) { this.pageNum = val; this.loadData(); },
        getStatusType(row) {
            // 优先使用动态状态
            const status = row.dynamicStatus || row.status;
            const statusMap = { '正常': 'success', '近效期': 'warning', '过期': 'danger', '锁定': 'info', '临期': 'info' };
            return statusMap[status] || 'info';
        }
    }
});
</script>
</body>
</html>
