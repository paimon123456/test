server:
  port: 8080

spring:
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  datasource:
    url: jdbc:mysql://localhost:3306/drug_shop?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  # 禁用静态资源缓存（开发环境）
  web:
    resources:
      cache:
        period: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

# 分页插件配置（PageHelper）
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

# 日志配置
logging:
  level:
    com.example.drug.mapper: debug

# 日志保留策略（操作日志和异常日志自动清理，单位：月）
log:
  retain:
    months: 6
